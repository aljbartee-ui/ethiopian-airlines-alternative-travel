                const apps = storage.getApplications();
                apps.push({ ...app, id: Date.now(), submittedAt: new Date().toISOString() });
                localStorage.setItem('visaApplications', JSON.stringify(apps));
                return apps;
            },
            updateApplication: (id, updates) => {
                const apps = storage.getApplications();
                const index = apps.findIndex(a => a.id === id);
                if (index !== -1) {
                    apps[index] = { ...apps[index], ...updates };
                    localStorage.setItem('visaApplications', JSON.stringify(apps));
                }
                return apps;
            },
            deleteApplication: (id) => {
                const apps = storage.getApplications().filter(a => a.id !== id);
                localStorage.setItem('visaApplications', JSON.stringify(apps));

                lucide.createIcons();
            }, [applications, selectedApp]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === ADMIN_PASSWORD) {
                    setIsAuthenticated(true);
                } else {
                    alert('Incorrect password');
                }
            };

            const updateStatus = (id, status) => {
                const updated = storage.updateApplication(id, { status });
                setApplications(updated);
            };

            const deleteApp = (id) => {
                if (confirm('Are you sure you want to delete this application?')) {
                    const updated = storage.deleteApplication(id);
                    setApplications(updated);
                }
            };

            const exportToCSV = () => {
                const headers = ['ID', 'Date', 'Name', 'Nationality', 'Civil ID', 'Passport', 'Phone', 'Email', 'Destination', 'Transit', 'Flight', 'Travel Date', 'Status'];
                const rows = applications.map(app => [
                    app.id,
                    app.submittedAt,
                    app.fullName,
                    app.nationality,
                    app.civilId,
                    app.passportNumber,
                    app.phoneNumber,
                    app.email,
                    app.destinationAirport === 'OTHER' ? app.customDestinationAirport : app.destinationAirport,
                    app.transitAirport,
                    app.flightNumber,
                    app.travelDate,
                    app.status || 'Pending'
                ]);
                
                const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `visa-applications-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();

                doc.text(`Flight Number: ${app.flightNumber}`, 20, 160);

                                                className="bg-ethiopian-green hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                            >
                                                <i data-lucide="file-text" className="w-4 h-4"></i>
                                                View Civil ID
                                            </a>
                                        )}
                                        {selectedApp.passportFile && (
                                            <a 
                                                href={selectedApp.passportFile} 
                                                target="_blank"
                                                className="bg-ethiopian-green hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                            >
                                                <i data-lucide="file-text" className="w-4 h-4"></i>
                                                View Passport
                                            </a>
                                        )}
                                        {selectedApp.photoFile && (
                                            <a 
                                                href={selectedApp.photoFile} 
                                                target="_blank"
                                                className="bg-ethiopian-green hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                            >
                                                <i data-lucide="image" className="w-4 h-4"></i>
                                                View Photo
                                            </a>
                                        )}
                                    </div>
                                </div>

                                {/* Status */}
                                <div className="mt-6">
                                    <h3 className="text-lg font-semibold text-ethiopian-yellow mb-3">Status</h3>
                                    <div className="flex gap-2">
                                        <span className={`px-3 py-1 rounded-full text-sm font-medium ${
                                            selectedApp.status === 'Approved' ? 'bg-green-500 text-white' :
                                            selectedApp.status === 'Rejected' ? 'bg-red-500 text-white' :
                                            selectedApp.status === 'In Progress' ? 'bg-yellow-500 text-black' :
                                            'bg-gray-500 text-white'
                                        }`}>
                                            {selectedApp.status || 'Pending'}
                                        </span>
                                    </div>
                                    <div className="flex gap-2 mt-3">
                                        <button
                                            onClick={() => { updateStatus(selectedApp.id, 'In Progress'); setSelectedApp({...selectedApp, status: 'In Progress'}); }}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded-lg transition-colors"
                                        >
                                            Mark In Progress
                                        </button>
                                        <button
                                            onClick={() => { updateStatus(selectedApp.id, 'Approved'); setSelectedApp({...selectedApp, status: 'Approved'}); }}
                                            className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition-colors"
                                        >
                                            Approve
                                        </button>
                                        <button
                                            onClick={() => { updateStatus(selectedApp.id, 'Rejected'); setSelectedApp({...selectedApp, status: 'Rejected'}); }}
                                            className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition-colors"
                                        >
                                            Reject
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-900 p-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-gray-800 rounded-xl shadow-2xl p-6">
                            <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
                                <h2 className="text-2xl font-bold text-white">Visa Applications Dashboard</h2>
                                <div className="flex gap-2">
                                    <button
                                        onClick={exportToCSV}
                                        className="bg-ethiopian-green hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                    >
                                        <i data-lucide="download" className="w-4 h-4"></i>
                                        Export CSV
                                    </button>
                                    <a
                                        href="#/"
                                        className="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors"
                                    >
                                        Back to Home
                                    </a>
                                </div>
                            </div>

                            {applications.length === 0 ? (
                                <div className="text-center py-12 text-gray-400">
                                    <i data-lucide="inbox" className="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                                    <p>No applications found</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead className="bg-gray-700">
                                            <tr>
                                                <th className="px-4 py-3 text-left text-gray-300">Date</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Name</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Nationality</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Destination</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Transit</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Flight</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Status</th>
                                                <th className="px-4 py-3 text-left text-gray-300">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {applications.map(app => (
                                                <tr key={app.id} className="border-t border-gray-700 hover:bg-gray-700/50">
                                                    <td className="px-4 py-3 text-gray-300">{new Date(app.submittedAt).toLocaleDateString()}</td>
                                                    <td className="px-4 py-3 text-gray-300">{app.fullName}</td>
                                                    <td className="px-4 py-3 text-gray-300">{app.nationality}</td>
                                                    <td className="px-4 py-3 text-gray-300">{app.destinationAirport === 'OTHER' ? app.customDestinationAirport : app.destinationAirport}</td>
                                                    <td className="px-4 py-3 text-gray-300">{app.transitAirport}</td>
                                                    <td className="px-4 py-3 text-gray-300">{app.flightNumber}</td>
                                                    <td className="px-4 py-3">
                                                        <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                            app.status === 'Approved' ? 'bg-green-500 text-white' :
                                                            app.status === 'Rejected' ? 'bg-red-500 text-white' :
                                                            app.status === 'In Progress' ? 'bg-yellow-500 text-black' :
                                                            'bg-gray-500 text-white'
                                                        }`}>
                                                            {app.status || 'Pending'}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <div className="flex gap-1">
                                                            <button
                                                                onClick={() => setSelectedApp(app)}
                                                                className="bg-ethiopian-green hover:bg-green-700 text-white px-2 py-1 rounded text-sm transition-colors"
                                                            >
                                                                View
                                                            </button>
                                                            <button
                                                                onClick={() => downloadPDF(app)}
                                                                className="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-sm transition-colors"
                                                            >
                                                                PDF
                                                            </button>
                                                            <button
                                                                onClick={() => deleteApp(app.id)}
                                                                className="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-sm transition-colors"
                                                            >
                                                                Delete
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = useState(window.location.hash);

            useEffect(() => {
                const handleHashChange = () => setCurrentPage(window.location.hash);
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage]);

            if (currentPage === '#/admin') {
                return <AdminDashboard />;
            }

            return (
                <main className="min-h-screen bg-[#1a1a1a]">
                    <Hero />
                    <ApplicationForm />
                    <footer className="bg-gray-900 py-8 px-4">
                        <div className="max-w-6xl mx-auto text-center">
                            <p className="text-gray-400 text-sm">
                                © 2024 Ethiopian Airlines Kuwait Office. All rights reserved.
                            </p>
                            <a href="#/admin" className="text-ethiopian-green hover:text-ethiopian-yellow text-sm mt-2 inline-block transition-colors">
                                Admin Login
                            </a>
                        </div>
                    </footer>
                </main>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
